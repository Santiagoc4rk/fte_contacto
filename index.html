<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTE+ | Contáctanos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=Inter:wght@400;500;600&display=swap');

  :root{
    --navy:#0B2545;
    --navy-2:#123661;
    --gold:#F5A623;
    --cream:#F7F5F0;
    --ok:#3FB88A;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    font-family:'Inter', sans-serif;
    background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 48px 20px;
    color:var(--cream);
  }

  .card{
    width:100%;
    max-width:420px;
  }

  .brand{
    text-align:center;
    margin-bottom:36px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .brand .mark{
    width:56px;
    height:56px;
    margin:0 auto 14px;
    border-radius:16px;
    background:var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fraunces', serif;
    font-weight:900;
    font-size:26px;
    color:var(--navy);
  }

  .brand h1{
    font-family:'Fraunces', serif;
    font-weight:900;
    font-size:28px;
    letter-spacing:-0.02em;
  }

  .brand p{
    font-size:14px;
    color:#B8C4D9;
    margin-top:6px;
  }

  .section-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color:var(--gold);
    margin: 28px 0 12px 4px;
    font-weight:600;
  }

  .member{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:16px 18px;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  .member-info{
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .member-info .name{
    font-weight:600;
    font-size:15px;
  }

  .member-info .role{
    font-size:12px;
    color:#9AAAC4;
  }

  .actions{
    display:flex;
    gap:8px;
    flex-shrink:0;
  }

  .icon-btn{
    width:38px;
    height:38px;
    border-radius:11px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  .icon-btn:hover{
    transform: translateY(-2px);
    opacity:0.9;
  }

  .icon-btn.wa{ background: var(--ok); }
  .icon-btn.ig{ background: linear-gradient(135deg,#F58529,#DD2A7B,#8134AF); }
  .icon-btn.mail{ background: #4A6FA5; }

  .icon-btn svg{ width:18px; height:18px; }

  footer{
    text-align:center;
    margin-top:32px;
    font-size:12px;
    color:#7488A6;
  }

  footer span{ color: var(--gold); }

  @media (prefers-reduced-motion: reduce){
    .icon-btn{ transition:none; }
  }
</style>
</head>
